name: Deploy to Production

on:
  push:
    branches:
      - main


jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node Dependencies & Build Assets
        run: |
          npm ci
          npm run production

      - name: Create Deployment Archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='graphify-out' \
            --exclude='storage' \
            --exclude='public/uploads' \
            --exclude='public/demo_db' \
            --exclude='tests' \
            .
          mv /tmp/deploy.tar.gz .

      - name: Deploy Archive to Server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -e scp -o StrictHostKeyChecking=no -P 22 deploy.tar.gz ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/var/www/DhatriProduction/

      - name: Extract Archive and Execute Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /var/www/DhatriProduction
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/temp/mpdf
            sudo chmod -R 777 storage bootstrap/cache
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
